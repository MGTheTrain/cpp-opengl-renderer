name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  analyze:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout vcpkg submodule
        run: git submodule update --init third-party/vcpkg

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libxmu-dev libxi-dev libgl-dev \
            libxinerama-dev libxcursor-dev xorg-dev \
            libglu1-mesa-dev pkg-config \
            autoconf autoconf-archive automake libtool libltdl-dev

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-build-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-build-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-extended

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LIB=ON -DBUILD_APP=ON -DBUILD_TEST=OFF \
            -DCMAKE_TOOLCHAIN_FILE=./third-party/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build build --parallel

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
