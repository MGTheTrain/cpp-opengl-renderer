name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    uses: ./.github/workflows/build-reusable.yml
    with:
      run_tests: true
      upload_packages: true
      revision_number: ''

  publish-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: release-artifacts/linux/

      - name: Download macOS packages
        uses: actions/download-artifact@v4
        with:
          name: macos-packages
          path: release-artifacts/macos/

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: release-artifacts/windows/

      - name: Download web packages
        uses: actions/download-artifact@v4
        with:
          name: web-packages
          path: release-artifacts/web/

      - name: Attach packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/linux/*
            release-artifacts/macos/*
            release-artifacts/windows/*
            release-artifacts/web/*
