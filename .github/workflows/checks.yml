name: Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "Formatting changes detected. Run 'pre-commit run --all-files' locally and commit the result."
            git diff
            exit 1
          fi
