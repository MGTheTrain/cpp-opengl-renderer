name: Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "Formatting changes detected. Run 'pre-commit run --all-files' locally and commit the result."
            git diff
            exit 1
          fi

  clang-tidy:
    name: Run clang-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake clang clang-tidy \
            libxmu-dev libxi-dev libgl-dev \
            libxinerama-dev libxcursor-dev xorg-dev \
            libglu1-mesa-dev pkg-config \
            autoconf autoconf-archive automake libtool libltdl-dev

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
        working-directory: /tmp/

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-

      - name: Generate compilation database
        run: |
          cmake -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_LIB=ON -DBUILD_APP=ON -DBUILD_TEST=OFF \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Run clang-tidy
        run: |
          find modules apps -name '*.cpp' \
            | grep -v third-party \
            | xargs -P$(nproc) clang-tidy -p build --config-file=.clang-tidy

  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake python3-pip \
            libxmu-dev libxi-dev libgl-dev \
            libxinerama-dev libxcursor-dev xorg-dev \
            libglu1-mesa-dev pkg-config \
            libglew-dev libglfw3-dev \
            autoconf autoconf-archive automake libtool libltdl-dev

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
        working-directory: /tmp/

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-

      - name: Install sonar-scanner
        run: |
          SONAR_VERSION=$(curl -s https://api.github.com/repos/SonarSource/sonar-scanner-cli/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSLo sonar-scanner.zip \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_VERSION}-linux-x64.zip"
          unzip -q sonar-scanner.zip
          echo "${PWD}/sonar-scanner-${SONAR_VERSION}-linux-x64/bin" >> $GITHUB_PATH

      - name: Install gcovr
        run: pip install gcovr

      - name: Configure with coverage and compile commands
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_LIB=ON -DBUILD_APP=OFF -DBUILD_TEST=ON \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run tests
        run: |
          Xvfb :99 &
          sleep 1
          DISPLAY=:99 ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        run: |
          mkdir -p coverage
          gcovr \
            --sonarqube coverage/sonarqube.xml \
            --root . \
            --filter 'modules/' \
            --exclude '.*test.*' \
            --exclude '.*vcpkg_installed.*' \
            build

      - name: Run sonar-scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.cfamily.compile-commands=build/compile_commands.json \
            -Dsonar.coverageReportPaths=coverage/sonarqube.xml

      - name: Wait for SonarCloud processing
        run: sleep 5

      - name: Check quality thresholds
        run: |
          RESPONSE=$(curl -s \
            "https://sonarcloud.io/api/measures/component?component=MGTheTrain_cpp-opengl-renderer&metricKeys=coverage,reliability_rating,security_rating,sqale_rating")

          python3 -c "
          import sys, json

          data = json.loads('''${RESPONSE}''')
          measures = {m['metric']: m['value'] for m in data['component']['measures']}

          coverage = float(measures['coverage'])
          reliability = int(float(measures['reliability_rating']))
          security = int(float(measures['security_rating']))
          maintainability = int(float(measures['sqale_rating']))

          # 1=A, 2=B, 3=C, 4=D, 5=E
          failed = False
          if coverage < 65.0:
              print(f'FAIL: Coverage {coverage}% is below 65%')
              failed = True
          if reliability != 1:
              print(f'FAIL: Reliability rating is not A (got {reliability})')
              failed = True
          if security != 1:
              print(f'FAIL: Security rating is not A (got {security})')
              failed = True
          if maintainability != 1:
              print(f'FAIL: Maintainability rating is not A (got {maintainability})')
              failed = True

          if failed:
              sys.exit(1)
          print(f'All checks passed — Coverage: {coverage}%, Reliability: A, Security: A, Maintainability: A')
          "
  asan:
    name: Address Sanitizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout vcpkg submodule
        run: git submodule update --init third-party/vcpkg

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libxmu-dev libxi-dev libgl-dev \
            libxinerama-dev libxcursor-dev xorg-dev \
            libglu1-mesa-dev pkg-config \
            autoconf autoconf-archive automake libtool libltdl-dev xvfb

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
        working-directory: /tmp/

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-build-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-build-

      - name: Build with ASAN
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_LIB=ON -DBUILD_APP=OFF -DBUILD_TEST=ON \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build --parallel

      - name: Run tests with ASAN
        run: |
          Xvfb :99 &
          sleep 1
          DISPLAY=:99 ASAN_OPTIONS=detect_leaks=1 ctest --test-dir build --output-on-failure
