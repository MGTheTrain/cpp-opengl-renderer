name: Build Reusable

on:
  workflow_call:
    inputs:
      run_tests:
        type: boolean
        default: false
      upload_packages:
        type: boolean
        default: false
      revision_number:
        type: string
        default: ''

jobs:
  build-and-test-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install third-party apt dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          libxmu-dev libxi-dev libgl-dev \
          libxinerama-dev libxcursor-dev xorg-dev \
          libglu1-mesa-dev pkg-config \
          autoconf autoconf-archive automake libtool libltdl-dev

    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
      working-directory: /tmp/

    - name: Cache vcpkg installed (build)
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build/vcpkg_installed
        key: ${{ runner.os }}-vcpkg-installed-build-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-installed-build-

    - name: Cache vcpkg installed (build-test)
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build-test/vcpkg_installed
        key: ${{ runner.os }}-vcpkg-installed-build-test-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-installed-build-test-

    - name: Install dependencies for test executables requiring a graphical environment
      run: sudo apt-get install -y xvfb

    - name: Build and Test on Linux
      run: |
        Xvfb :99 &
        export DISPLAY=:99
        FLAGS="-CMakeToolchainFile /tmp/vcpkg/scripts/buildsystems/vcpkg.cmake -Release"
        if [ "${{ inputs.run_tests }}" = "true" ]; then
          FLAGS="$FLAGS -RunTests"
        fi
        if [ -n "${{ inputs.revision_number }}" ]; then
          FLAGS="$FLAGS -RevisionNumber ${{ inputs.revision_number }}"
        fi
        ./build.sh $FLAGS
      working-directory: ./scripts/

    - name: Create Linux packages
      if: ${{ inputs.upload_packages }}
      run: |
        cpack --config build/CPackConfig.cmake -G ZIP
        cpack --config build/CPackConfig.cmake -G DEB

    - name: Upload Linux packages
      if: ${{ inputs.upload_packages }}
      uses: actions/upload-artifact@v4
      with:
        name: linux-packages
        path: packages/
        retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install third-party choco dependencies
      run: choco install cmake

    - name: Install vcpkg
      run: |
        cd $env:TEMP
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat

    - name: Cache vcpkg installed
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build/vcpkg_installed
        key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-installed-

    - name: Build on Windows
      shell: pwsh
      run: |
        $params = @{
          CMakeToolchainFile = "$env:TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake"
          Release = $true
        }
        if ("${{ inputs.revision_number }}") {
          $params["RevisionNumber"] = "${{ inputs.revision_number }}"
        }
        .\build.ps1 @params
      working-directory: .\scripts\

    - name: Create Windows packages
      if: ${{ inputs.upload_packages }}
      shell: pwsh
      run: cpack --config build/CPackConfig.cmake -G ZIP

    - name: Upload Windows packages
      if: ${{ inputs.upload_packages }}
      uses: actions/upload-artifact@v4
      with:
        name: windows-packages
        path: packages/
        retention-days: 1

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install third-party brew dependencies
      run: brew install pkg-config cmake

    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
      working-directory: /tmp/

    - name: Cache vcpkg installed
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/build/vcpkg_installed
        key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-installed-

    - name: Build on macOS
      run: |
        FLAGS="-CMakeToolchainFile /tmp/vcpkg/scripts/buildsystems/vcpkg.cmake -Release"
        if [ -n "${{ inputs.revision_number }}" ]; then
          FLAGS="$FLAGS -RevisionNumber ${{ inputs.revision_number }}"
        fi
        ./build.sh $FLAGS
      working-directory: ./scripts/

    - name: Create macOS packages
      if: ${{ inputs.upload_packages }}
      run: cpack --config build/CPackConfig.cmake -G ZIP

    - name: Upload macOS packages
      if: ${{ inputs.upload_packages }}
      uses: actions/upload-artifact@v4
      with:
        name: macos-packages
        path: packages/
        retention-days: 1

  build-web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache Emscripten SDK
      id: cache-emsdk
      uses: actions/cache@v4
      with:
        path: /tmp/emsdk
        key: ${{ runner.os }}-emsdk-latest

    - name: Install Emscripten SDK
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
        /tmp/emsdk/emsdk install latest
        /tmp/emsdk/emsdk activate latest

    - name: Build for web
      run: |
        source /tmp/emsdk/emsdk_env.sh
        FLAGS="-WebBuild"
        if [ -n "${{ inputs.revision_number }}" ]; then
          FLAGS="$FLAGS -RevisionNumber ${{ inputs.revision_number }}"
        fi
        ./build.sh $FLAGS
      working-directory: ./scripts/

    - name: Create web package
      if: ${{ inputs.upload_packages }}
      run: cpack --config build/CPackConfig.cmake -G ZIP

    - name: Upload web package
      if: ${{ inputs.upload_packages }}
      uses: actions/upload-artifact@v4
      with:
        name: web-packages
        path: packages/
        retention-days: 1
